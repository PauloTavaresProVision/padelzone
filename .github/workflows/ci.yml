name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Valores ficticios so para tsc/build: no CI nao ha BD nem se liga a nada.
      # (O AUTH_SECRET so e validado em runtime; aqui e so para nao faltar.)
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci?schema=public"
      AUTH_SECRET: "ci-placeholder-secret-0123456789"
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Instalar dependencias
        run: npm ci
      - name: Gerar cliente Prisma
        run: npx prisma generate
      - name: Verificar tipos (tsc)
        run: npx tsc --noEmit
      - name: Testes
        run: npm test
      - name: Build (next build)
        run: npm run build
